version: "3.9"

services:
  db:
    image: postgres:16
    container_name: strak-social-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-strak_social}
    volumes:
      - strak-social-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    # Remover ports em produção (usar rede interna)

  api:
    build:
      context: .
      dockerfile: dockerfile.api
    container_name: strak-social-api
    working_dir: /usr/src/app
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-strak_social}
      PORT: 3001
      NODE_ENV: production
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://yourdomain.com}
    depends_on:
      db:
        condition: service_healthy
    restart: always
    # Remover ports em produção (usar proxy reverso)

  app:
    build:
      context: .
      dockerfile: dockerfile.app
    container_name: strak-social-app
    depends_on:
      - api
    restart: always
    # Remover ports em produção (usar proxy reverso)

volumes:
  strak-social-pgdata:
